name: Next.js DevSecOps + QA CI/CD with PNPM + GHCR

on:
  push:
    branches: ["main"]

jobs:

  # =========================
  # 📦 SETUP JOB
  # =========================
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Enable PNPM
        run: corepack enable

      - name: Cache PNPM
        id: cache
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Upload node_modules
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: node_modules


  # =========================
  # 🧪 QA + 🔐 SECURITY JOB
  # =========================
  qa-security:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Enable PNPM
        run: corepack enable

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node_modules

      - name: Run Lint
        run: pnpm lint


  # =========================
  # 🏗 BUILD JOB
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: qa-security

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node_modules

      - name: Build App
        run: pnpm build

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next


  # =========================
  # 🐳 DOCKER JOB
  # =========================
  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: .next

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build Docker Image
        run: docker build -t ghcr.io/${{ env.OWNER }}/nextjs-app:latest .

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/nextjs-app:latest
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Push Docker Image
        run: docker push ghcr.io/${{ env.OWNER }}/nextjs-app:latest
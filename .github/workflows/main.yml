name: Next.js DevSecOps + QA CI/CD with PNPM + GHCR

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v5

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # 3. Enable PNPM
      - name: Enable Corepack
        run: corepack enable

      # 4. Install Dependencies
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # 🧪 QA STAGE
      # =========================

      # 5. Lint Check
      - name: Run Lint (ESLint)
        run: pnpm lint

      # 6. Run Unit Tests
      - name: Run Tests
        run: pnpm test

      # 7. Test Coverage (optional)
      - name: Generate Coverage
        run: pnpm test -- --coverage

      # =========================
      # 🔐 SECURITY STAGE
      # =========================

      # 8. Dependency Scan
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1

      # 9. Secret Scan
      - name: Scan for Secrets
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          path: .
          base: main
          head: HEAD

      # =========================
      # 🏗 BUILD STAGE
      # =========================

      # 10. Build App
      - name: Build App
        run: pnpm build

      # =========================
      # 🐳 CONTAINER STAGE
      # =========================

      # 11. Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 12. Lowercase repo owner
      - name: Set lowercase repo owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 13. Build Docker Image
      - name: Build Docker Image
        run: docker build -t ghcr.io/${{ env.OWNER }}/nextjs-app:latest .

      # 14. Scan Docker Image
      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/nextjs-app:latest
          severity: CRITICAL,HIGH
          exit-code: 1

      # 15. Push Image
      - name: Push Docker Image
        run: docker push ghcr.io/${{ env.OWNER }}/nextjs-app:latest
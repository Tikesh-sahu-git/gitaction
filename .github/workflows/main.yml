name: Next.js DevSecOps + QA CI/CD with PNPM + GHCR

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      # =========================
      # 📦 SETUP
      # =========================

      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Enable PNPM
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # =========================
      # 🧪 QA STAGE
      # =========================

      - name: Run Lint (ESLint)
        run: pnpm lint

      # =========================
      # 🔐 SECURITY STAGE
      # =========================

      # Cache Trivy DB (faster scans ⚡)
      - name: Cache Trivy DB
        uses: actions/cache@v3
        with:
          path: .cache/trivy
          key: trivy-${{ runner.os }}
          restore-keys: |
            trivy-${{ runner.os }}

      # Dependency Scan (SCA)
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1
          cache-dir: .cache/trivy

      # Secret Scan
      - name: Scan for Secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          path: .
          extra_args: --only-verified

      # =========================
      # 🏗 BUILD STAGE
      # =========================

      - name: Build App
        run: pnpm build

      # =========================
      # 🐳 CONTAINER STAGE
      # =========================

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build Docker Image
        run: docker build -t ghcr.io/${{ env.OWNER }}/nextjs-app:latest .

      # Debug (ensure image exists ✅)
      - name: Verify Docker Image
        run: docker images

      # Docker Image Scan (Trivy)
      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/nextjs-app:latest
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: 0   # ⚠️ don't break pipeline (recommended)

      # =========================
      # 🚀 DEPLOY (PUSH)
      # =========================

      - name: Push Docker Image
        run: docker push ghcr.io/${{ env.OWNER }}/nextjs-app:latest